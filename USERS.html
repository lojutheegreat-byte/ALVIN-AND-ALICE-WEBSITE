<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile Page</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  font-family:Arial, sans-serif;
  overflow-x:hidden;
  background:black;
}

body{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* EXTRA BLUR BACKGROUND */
.body-bg{
  position:fixed;
  inset:0;

  background:url("body.jpg") no-repeat center center;
  background-size:cover;

  filter:blur(18px);
  transform:scale(1.1);

  z-index:-4;
}

/* BACKGROUND IMAGE */
.bg{
  position:fixed;
  inset:0;

  background:url("profile.jpg") no-repeat center center;
  background-size:cover;

  transform:scale(1.05);

  z-index:-3;
}

/* BLUR LAYER */
.blur{
  position:fixed;
  inset:0;
  backdrop-filter:blur(5px);
  z-index:-2;
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:-1;
}

/* MAIN CONTAINER */
.profile-container{
  width:100%;
  max-width:1100px;
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:120px;

  padding:20px;

  animation:slideUp 1s ease;
}

/* PROFILE LINK */
.profile-link{
  text-decoration:none;
  color:inherit;
  display:flex;
  justify-content:center;
}

/* PROFILE CARD */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;

  width:260px;

  padding:28px 20px;

  border-radius:24px;

  background:rgba(255,255,255,0.10);

  backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,0.15);

  box-shadow:0 10px 30px rgba(0,0,0,0.45);

  transition:0.3s;
}

.profile:hover{
  transform:translateY(-6px) scale(1.03);
}

/* CLICK EFFECT */
.profile img{
  width:160px;
  height:160px;

  border-radius:50%;

  object-fit:cover;

  border:4px solid white;

  box-shadow:0 8px 25px rgba(0,0,0,0.5);

  cursor:pointer;
  transition:0.2s ease;
}

.profile img:active{
  transform:scale(0.95);
}

/* NAME */
.name{
  margin-top:18px;

  color:white;

  font-size:24px;
  font-weight:bold;

  letter-spacing:2px;
  text-align:center;
}

/* ANIMATION */
@keyframes slideUp{
  from{
    transform:translateY(80px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}

/* TABLET */
@media screen and (max-width:900px){
  .profile-container{
    gap:60px;
  }

  .profile{
    width:220px;
  }

  .profile img{
    width:140px;
    height:140px;
  }

  .name{
    font-size:21px;
  }
}

/* MOBILE */
@media screen and (max-width:600px){
  body{
    padding:15px;
  }

  .profile-container{
    flex-direction:column;
    gap:35px;
    padding:30px 0;
    min-height:auto;
  }

  .profile{
    width:100%;
    max-width:320px;
    padding:24px 16px;
  }

  .profile img{
    width:130px;
    height:130px;
  }

  .name{
    font-size:20px;
    letter-spacing:1px;
  }
}

</style>
</head>

<body>

<!-- BACKGROUNDS -->
<div class="body-bg"></div>
<div class="bg"></div>
<div class="blur"></div>
<div class="overlay"></div>

<!-- MAIN CONTENT -->
<div class="profile-container">

  <!-- LEFT USER -->
  <a href="home.html" class="profile-link">
    <div class="profile">
      <img src="thegreat.jpg" alt="THE GREAT Profile">
      <div class="name">THE GREAT</div>
    </div>
  </a>

  <!-- RIGHT USER -->
  <a href="home.html" class="profile-link">
    <div class="profile">
      <img src="LAXINE.jpg" alt="LAXINE Profile">
      <div class="name">LAXINE</div>
    </div>
  </a>

</div>

</body>
</html>
