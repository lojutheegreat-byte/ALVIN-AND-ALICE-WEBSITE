<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alvin & Alice Feed</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    align-items:center;

    padding-top:120px;
    padding-bottom:120px;

    background:url("body.jpg") center/cover no-repeat fixed;

    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif;
    overflow-x:hidden;
}

/* DARK OVERLAY */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter: blur(3px);
    z-index:-1;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    max-width:1050px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 20px;
    border-radius:70px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.25);

    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    z-index:10;
}

.logo{
    font-weight:900;
    font-size:16px;
    letter-spacing:2px;

    background:linear-gradient(45deg,#ff4ecd,#7b61ff,#00d4ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.nav-links{
    display:flex;
    gap:10px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-size:13px;

    padding:7px 12px;
    border-radius:25px;

    background:rgba(255,255,255,0.08);
}

/* FEED */
#feed{
    width:100%;
    max-width:900px;

    display:flex;
    flex-direction:column;
    gap:24px;
}

/* ================= POST CARD ================= */
.post{
    position:relative;

    border-radius:30px;

    overflow:hidden;

    background:rgba(255,255,255,0.08);

    box-shadow:0 12px 35px rgba(0,0,0,0.35);

    animation:fadeUp 0.6s ease;
}

/* 🔥 BLURRED BACKGROUND LAYER */
.post::before{
    content:"";
    position:absolute;
    inset:0;

    background:var(--img);

    background-size:cover;
    background-position:center;

    filter:blur(30px) brightness(0.6);
    transform:scale(1.2);

    z-index:0;
}

/* CONTENT LAYER */
.post-content{
    position:relative;
    z-index:2;

    padding:16px;

    display:flex;
    flex-direction:column;
}

/* TIME */
.post-time{
    margin-bottom:10px;
    font-size:11px;
    color:rgba(255,255,255,0.7);
}

/* MAIN IMAGE (CLEAR) */
.post img{
    width:100%;
    height:auto;
    max-height:450px;

    object-fit:contain;

    border-radius:22px;

    background:rgba(255,255,255,0.05);
}

/* ANIMATION */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* BOTTOM BAR */
.bottom-bar{
    position:fixed;
    bottom:16px;
    left:50%;
    transform:translateX(-50%);

    width:55%;
    max-width:260px;
    height:44px;

    background:rgba(255,255,255,0.22);
    backdrop-filter:blur(40px);

    border-radius:28px;

    display:flex;
    justify-content:center;
    align-items:center;

    border:1px solid rgba(255,255,255,0.25);
}

.bottom-bar span{
    font-size:13px;
    font-weight:600;
    color:black;
    letter-spacing:2px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">ALVIN & ALICE</div>

    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="cuotes.html">Comics</a>
    </div>
</div>

<!-- FEED -->
<div id="feed"></div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
    <span>GALLERY</span>
</div>

<script>

const feed = document.getElementById("feed");

/* A1 → A102 */
const stories = [];
for(let i = 1; i <= 102; i++){
    stories.push(`A${i}.jpg`);
}

window.onload = () => {
    stories.forEach(img => {
        renderStory({
            url: img,
            time: new Date().toLocaleString()
        });
    });
};

function renderStory(data){

    let post = document.createElement("div");
    post.className = "post";

    // set image as CSS variable for blur background
    post.style.setProperty("--img", `url(${data.url})`);

    post.innerHTML = `
        <div class="post-content">
            <div class="post-time">Posted: ${data.time}</div>
            <img src="${data.url}">
        </div>
    `;

    feed.appendChild(post);
}

</script>

</body>
</html>
