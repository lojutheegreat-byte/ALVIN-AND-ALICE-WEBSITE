<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alvin & Alice Feed</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;

    padding-top:110px;
    padding-bottom:90px;

    background:url("body.jpg") center/cover no-repeat fixed;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif;
}

/* OVERLAY */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:-1;
}

/* NOTIFY */
#notify{
    position:fixed;
    top:-100px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 22px;
    border-radius:50px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.25);
    color:white;
    font-weight:600;
    font-size:14px;
    transition:0.6s;
    z-index:999;
}

#notify.show{ top:20px; }

/* NAVBAR */
.navbar{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    max-width:1000px;

    display:flex;
    justify-content:center;

    padding:14px 20px;
    border-radius:60px;

    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(22px);
    border:1px solid rgba(255,255,255,0.18);
}

.logo{
    font-weight:800;
    background:linear-gradient(45deg,#ff4ecd,#7b61ff,#00d4ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* INPUT BAR */
.input-box{
    width:92%;
    max-width:900px;
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.input-box input{
    flex:1;
    padding:12px 15px;
    border:none;
    border-radius:30px;
    outline:none;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    color:white;
}

.save-btn{
    padding:12px 18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    color:white;
    font-weight:600;
    background:linear-gradient(45deg,#ff4ecd,#7b61ff,#00d4ff);
    background-size:300% 300%;
    animation:move 4s infinite;
}

/* POST */
.post{
    width:92%;
    max-width:900px;

    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;

    padding:15px;
    margin-bottom:15px;

    border-radius:20px;

    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(18px);
}

/* DELETE */
.delete-btn{
    padding:8px 12px;
    border:none;
    border-radius:20px;
    color:white;
    font-size:12px;
    cursor:pointer;
    background:rgba(255,0,80,0.25);
}

/* ANIMATION */
@keyframes move{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

</style>
</head>

<body>

<div id="notify">Loading...</div>

<div class="navbar">
    <div class="logo">ALVIN & ALICE</div>
</div>

<!-- INPUT -->
<div class="input-box">
    <input id="quoteInput" placeholder="Write your quote ❤️">
    <button class="save-btn" onclick="handleSave()">Save</button>
</div>

<div id="feed"></div>

<audio id="bell" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    deleteDoc,
    doc,
    serverTimestamp,
    query,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");
const notify = document.getElementById("notify");
const bell = document.getElementById("bell");

const colRef = collection(db, "quotes");

/* USER */
let userName = prompt("Enter username 👤:") || "Guest";
let userAvatar = "https://i.pravatar.cc/150?img=" + Math.floor(Math.random()*70);

/* NOTIFY */
function showNotify(text){
    notify.innerText = text;
    notify.classList.add("show");

    bell.currentTime = 0;
    bell.play().catch(()=>{});

    setTimeout(()=> notify.classList.remove("show"), 2000);
}

/* 🚀 FAST SAVE (NO LAG FEEL) */
window.handleSave = function(){

    const input = document.getElementById("quoteInput");
    const text = input.value.trim();

    if(!text){
        showNotify("Write something ❌");
        return;
    }

    input.value = "";

    // instant UI feel
    renderInstant({
        text,
        username: userName,
        avatar: userAvatar,
        time: "sending..."
    });

    showNotify("Sending ⚡");

    // background save
    addDoc(colRef, {
        text,
        username: userName,
        avatar: userAvatar,
        createdAt: serverTimestamp()
    }).then(() => {
        showNotify("Saved ❤️");
    });

}

/* INSTANT UI */
function renderInstant(data){

    let post = document.createElement("div");
    post.className = "post";

    post.innerHTML = `
        <div style="display:flex;gap:12px;flex:1;">

            <img src="${data.avatar}"
                style="width:45px;height:45px;border-radius:50%;object-fit:cover;border:2px solid white;">

            <div style="flex:1;color:white;">

                <div style="display:flex;align-items:center;gap:8px;font-size:13px;opacity:0.85;margin-bottom:5px;">
                    <b>${data.username}</b>
                    <span style="font-size:11px;opacity:0.6;">• ${data.time}</span>
                </div>

                <div style="font-size:15px;">
                    ${data.text} ❤️
                </div>

            </div>
        </div>

        <button class="delete-btn">sending...</button>
    `;

    feed.prepend(post);
}

/* DELETE */
window.deletePost = async function(id){
    await deleteDoc(doc(db,"quotes",id));
    showNotify("Deleted ❌");
}

/* REAL TIME SYNC */
const q = query(colRef, orderBy("createdAt","desc"));

onSnapshot(q,(snapshot)=>{

    feed.innerHTML="";

    snapshot.forEach((docSnap)=>{

        const data = docSnap.data();

        let time = data.createdAt?.toDate
            ? data.createdAt.toDate().toLocaleString()
            : "just now";

        let post = document.createElement("div");
        post.className="post";

        post.innerHTML=`
        <div style="display:flex;gap:12px;flex:1;">

            <img src="${data.avatar}"
            style="width:45px;height:45px;border-radius:50%;object-fit:cover;border:2px solid white;">

            <div style="flex:1;color:white;">

                <div style="display:flex;align-items:center;gap:8px;font-size:13px;opacity:0.85;margin-bottom:5px;">
                    <b>${data.username}</b>
                    <span style="font-size:11px;opacity:0.6;">• ${time}</span>
                </div>

                <div style="font-size:15px;">
                    ${data.text} ❤️
                </div>

            </div>
        </div>

        <button class="delete-btn" onclick="deletePost('${docSnap.id}')">
            Delete
        </button>
        `;

        feed.appendChild(post);
    });

});

window.onload = ()=>{
    showNotify("Live Feed Connected ❤️");
};

</script>

</body>
</html>
