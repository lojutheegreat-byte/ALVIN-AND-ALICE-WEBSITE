<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alvin & Alice Feed</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;

    padding-top:110px;
    padding-bottom:90px;

    background:url("body.jpg") center/cover no-repeat fixed;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif;
    overflow-x:hidden;
}

/* DARK OVERLAY */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:-1;
}

/* NOTIFICATION */
#notify{
    position:fixed;
    top:-100px;
    left:50%;
    transform:translateX(-50%);

    padding:12px 22px;
    border-radius:50px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.25);

    color:white;
    font-weight:600;
    font-size:14px;
    text-align:center;

    transition:0.6s ease;
    z-index:999;
}

#notify.show{ top:20px; }

/* NAVBAR */
.navbar{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    max-width:1000px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 20px;
    border-radius:60px;

    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(22px);
    border:1px solid rgba(255,255,255,0.18);
}

.logo{
    font-weight:800;
    font-size:16px;
    background:linear-gradient(45deg,#ff4ecd,#7b61ff,#00d4ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.nav-links{
    display:flex;
    gap:10px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-size:13px;
    padding:6px 10px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
}

/* ADD BUTTON */
.add-btn{
    position:fixed;
    bottom:20px;
    right:20px;

    width:65px;
    height:65px;

    border-radius:50%;
    border:none;

    font-size:30px;
    color:white;

    cursor:pointer;

    background:linear-gradient(45deg,#ff4ecd,#7b61ff,#00d4ff);
    background-size:300% 300%;
    animation:move 4s infinite;
}

/* POSTS */
.post{
    width:92%;
    max-width:900px;

    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:15px;

    padding:20px;
    margin-bottom:25px;

    border-radius:25px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
}

/* TEXT */
.post-text{
    color:white;
    flex:1;
    font-size:16px;
    line-height:1.6;
    text-align:center;
}

/* DELETE */
.delete-btn{
    padding:8px 14px;
    border:none;
    border-radius:20px;

    color:white;
    font-size:12px;
    font-weight:600;

    cursor:pointer;

    background:rgba(255,0,80,0.25);
    border:1px solid rgba(255,255,255,0.25);
}

/* MOBILE */
@media(max-width:768px){
    .post{
        flex-direction:column;
    }
}

/* ANIMATION */
@keyframes move{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

</style>
</head>

<body>

<div id="notify">Loading...</div>

<div class="navbar">
    <div class="logo">ALVIN & ALICE</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Gallery</a>
        <a href="#">Quotes</a>
    </div>
</div>

<div id="feed"></div>

<button class="add-btn" onclick="handleAdd()">+</button>

<audio id="bell" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    deleteDoc,
    doc,
    serverTimestamp,
    query,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔴 REPLACE WITH YOUR FIREBASE CONFIG */
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");
const notify = document.getElementById("notify");
const bell = document.getElementById("bell");

const colRef = collection(db, "quotes");

/* NOTIFY */
function showNotify(text){
    notify.innerText = text;
    notify.classList.add("show");

    bell.currentTime = 0;
    bell.play().catch(()=>{});

    setTimeout(()=> notify.classList.remove("show"), 3000);
}

/* ADD */
window.handleAdd = async function(){

    let quote = prompt("Write your quote ❤️:");

    if(!quote || quote.trim() === ""){
        showNotify("No quote added ❌");
        return;
    }

    await addDoc(colRef, {
        text: quote.trim(),
        createdAt: serverTimestamp()
    });

    showNotify("Quote sent ❤️");
}

/* DELETE */
window.deletePost = async function(id){
    await deleteDoc(doc(db, "quotes", id));
    showNotify("Deleted ❌");
}

/* REAL TIME LOAD */
const q = query(colRef, orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {

    feed.innerHTML = "";

    snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        let time = data.createdAt?.toDate
            ? data.createdAt.toDate().toLocaleString()
            : "Sending...";

        let post = document.createElement("div");
        post.className = "post";

        post.innerHTML = `
            <div class="post-text">
                <div style="font-size:12px;opacity:0.7;margin-bottom:6px;">
                    🕒 ${time}
                </div>
                "${data.text}" ❤️
            </div>

            <button class="delete-btn" onclick="deletePost('${docSnap.id}')">
                Delete
            </button>
        `;

        feed.appendChild(post);
    });

});

window.onload = () => {
    showNotify("Live Feed Connected ❤️");
};

</script>

</body>
</html>
